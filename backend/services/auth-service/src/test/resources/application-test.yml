spring:
  datasource:
    url: jdbc:h2:mem:auth_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-at-least-32-bytes-long-for-jwt-hs256
  issuer: test-issuer

auth:
  cookie:
    secure: false
  admin:
    bootstrap:
      enabled: true
      email: admin@gmail.com
      password: admin123

integration:
  hr:
    base-url: http://localhost:3003
    internal-token: test-internal-token

gateway:
  trust:
    enabled: false
