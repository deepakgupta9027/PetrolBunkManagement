server:
  port: 8080
  error:
    include-message: always

# Downstream base URLs (override per environment)
gateway:
  downstream:
    fuel: http://localhost:3001
    inventory: http://localhost:3002
    hr: http://localhost:3003

spring:
  application:
    name: petrol-pump-api-gateway
  cloud:
    gateway:
      routes:
        - id: fuel-service
          uri: ${gateway.downstream.fuel}
          predicates:
            - Path=/fuel/**
        - id: inventory-service
          uri: ${gateway.downstream.inventory}
          predicates:
            - Path=/inventory/**
        - id: hr-service
          uri: ${gateway.downstream.hr}
          predicates:
            - Path=/hr/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when_authorized
  health:
    defaults:
      enabled: true

logging:
  level:
    root: INFO
    com.petrolpump.gateway: INFO
